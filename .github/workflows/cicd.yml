name: CI/CD Pipeline

on:
  push:
    branches:
      - ngwpc-candidate
      - ngwpc-release
      - master
      - nwm-master
      - development
      - release-candidate
  pull_request:
    branches:
      - ngwpc-candidate
      - ngwpc-release
      - main
      - nwm-master
      - development
      - release-candidate
  workflow_dispatch:
    inputs:
      BMI_BASE_TAG:
        description: 'BMI_BASE_TAG'
        required: false
        type: string
      GHCR_ORG:
        description: 'GHCR_ORG'
        required: false
        type: string
      EWTS_ORG:
        description: 'EWTS_ORG'
        required: false
        type: string
      EWTS_REF:
        description: 'EWTS_REF'
        required: false
        type: string
      TRIGGER_DOWNSTREAM:
        description: 'Trigger downstream repos'
        required: false
        default: false
        type: boolean
      NGEN_REF:
        description: 'NGEN_REF'
        required: false
        type: string
      NWM_CAL_MGR_REF:
        description: 'NWM_CAL_MGR_REF'
        required: false
        type: string
      NWM_FCST_MGR_REF:
        description: 'NWM_FCST_MGR_REF'
        required: false
        type: string
      MSW_MGR_ORG:
        description: 'MSW_MGR_ORG'
        required: false
        type: string
      MSW_MGR_REF:
        description: 'MSW_MGR_REF'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  BMI_BASE_REPO: rockylinux

jobs:
  # set variables for use in other jobs
  setup:
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.vars.outputs.org }}
      bmi_image: ${{ steps.vars.outputs.bmi_image }}
      bmi_base_name: ${{ steps.vars.outputs.bmi_base_name }}
      bmi_base_tag: ${{ steps.vars.outputs.bmi_base_tag }}
      bmi_base_digest: ${{ steps.vars.outputs.bmi_base_digest }}
      bmi_base_revision: ${{ steps.vars.outputs.bmi_base_revision }}
      ewts_revision: ${{ steps.vars.outputs.ewts_revision }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
      alias_tag: ${{ steps.vars.outputs.alias_tag }}
      clean_ref: ${{ steps.vars.outputs.clean_ref }}
      default_ref: ${{ steps.vars.outputs.default_ref }}
      ewts_cache_bust: ${{ steps.vars.outputs.ewts_cache_bust }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          # set variables to use with Docker images
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}"

          # one datetime for all time variables
          NOW=$(date -u +'%Y-%m-%d %H:%M:%S')

          # for Docker image tags
          TIMESTAMP=$(date -u -d "$NOW" +'%Y%m%d%H%M%SZ')

          # logic to get the real branch name and commit SHA on pull requests
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            REAL_REF="${{ github.head_ref }}"
            REAL_SHA="${{ github.event.pull_request.head.sha }}"
          else
            REAL_REF="${{ github.ref_name }}"
            REAL_SHA="${GITHUB_SHA}"
          fi

          # clean ref name and short commit sha
          CLEAN_REF=$(echo "$REAL_REF" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          SHORT_SHA="${REAL_SHA:0:7}"

          # default source-repo ref: follow the release-line branch we're building from
          # (development / ngwpc-candidate / ngwpc-release); tags and other branches fall
          # back to development. Override per source repo via the *_REF dispatch inputs.
          case "${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}" in
            branch:development|branch:ngwpc-candidate|branch:ngwpc-release)
              DEFAULT_REF="$GITHUB_REF_NAME" ;;
            *)
              DEFAULT_REF="development" ;;
          esac
          # use an explicit *_REF input if provided, else DEFAULT_REF
          ref_or_default() { [ -n "$1" ] && echo "$1" || echo "$DEFAULT_REF"; }

          # skopeo is needed to inspect the base image
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          # base image metadata for BMI Dockerfile labels
          BMI_BASE_TAG_INPUT="${{ github.event.inputs.BMI_BASE_TAG || '' }}"
          if [ -n "$BMI_BASE_TAG_INPUT" ]; then
            BMI_BASE_TAG="$BMI_BASE_TAG_INPUT"
          else
            BMI_BASE_TAG="8"
          fi
          BMI_BASE_NAME="${BMI_BASE_REPO}:${BMI_BASE_TAG}"
          BMI_BASE_INSPECT=$(skopeo inspect --override-os linux --override-arch amd64 "docker://${BMI_BASE_NAME}")
          BMI_BASE_DIGEST=$(echo "$BMI_BASE_INSPECT" | jq -r '.Digest // "unknown"')
          BMI_BASE_REVISION=$(echo "$BMI_BASE_INSPECT" | jq -r '.Labels["org.opencontainers.image.revision"] // .Labels["io.ngwpc.image.base.revision"] // "unknown"')

          # resolve each source repo's ref (branch/tag/SHA) to its commit SHA for revision labels
          resolve_sha() {
            local url="$1" ref="$2" out sha
            # a full 40-char SHA can't be looked up via ls-remote; use it directly
            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then echo "$ref"; return; fi
            out=$(git ls-remote "$url" "$ref" "refs/tags/${ref}^{}" 2>/dev/null)
            # prefer the dereferenced commit (^{}) for annotated tags; else first match
            sha=$(echo "$out" | grep '\^{}$' | head -n1 | cut -f1)
            [ -z "$sha" ] && sha=$(echo "$out" | head -n1 | cut -f1)
            echo "${sha:-unknown}"
          }

          EWTS_REVISION=$(resolve_sha "https://github.com/${{ inputs.EWTS_ORG || github.repository_owner }}/nwm-ewts.git" "$(ref_or_default "${{ inputs.EWTS_REF }}")")

          # logic for the tags:
          # test_image_tag (commit short sha): used for the initial build and test
          # alias_tag: used for final tagging on successful tests

          # test tag is always commit short sha
          TEST_TAG="${SHORT_SHA}"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # for pull requests, use pr-<pr number>-build
            ALIAS="pr-${{ github.event.pull_request.number }}-build"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            # for workflow dispatches on tags, use the git tag
            ALIAS="${CLEAN_REF}"
          else
            # for pushes or workflow dispatches to branches, use <timestamp-branchname>
            ALIAS="${TIMESTAMP}-${CLEAN_REF}"
          fi

          # Resolve EWTS ref for Docker cache busting
          EWTS_ORG="${{ inputs.EWTS_ORG || github.repository_owner }}"
          EWTS_REF="${{ inputs.EWTS_REF || 'development' }}"

          if [[ "${EWTS_REF}" =~ ^[0-9a-f]{7,40}$ ]]; then
            EWTS_CACHE_BUST="${EWTS_REF}"
          else
            EWTS_CACHE_BUST="$(git ls-remote "https://github.com/${EWTS_ORG}/nwm-ewts.git" "${EWTS_REF}" | awk '{print $1}')"
          fi

          if [ -z "${EWTS_CACHE_BUST}" ]; then
            echo "ERROR: Could not resolve EWTS_REF=${EWTS_REF}"
            exit 1
          fi

          # save outputs
          cat >> "$GITHUB_OUTPUT" <<EOF
          org=${ORG}
          bmi_image=${IMAGE_BASE}/ngen-bmi-forcing
          bmi_base_name=${BMI_BASE_NAME}
          bmi_base_tag=${BMI_BASE_TAG}
          bmi_base_digest=${BMI_BASE_DIGEST}
          bmi_base_revision=${BMI_BASE_REVISION}
          ewts_revision=${EWTS_REVISION}
          ewts_cache_bust=${EWTS_CACHE_BUST}
          test_image_tag=${TEST_TAG}
          alias_tag=${ALIAS}
          commit_sha=${REAL_SHA}
          commit_sha_short=${SHORT_SHA}
          clean_ref=${CLEAN_REF}
          default_ref=${DEFAULT_REF}
          EOF

  # CodeQL scan
  codeql-scan:
    name: codeql-scan
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # build ngen-bmi-forcing Docker image
  pipeline-bmi:
    name: pipeline-bmi
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      bmi_digest: ${{ steps.build_bmi_image.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push BMI Forcing
        id: build_bmi_image # set ID to capture output from this step to use outputs like digest, imageid, and metadata
        uses: docker/build-push-action@v7
        with:
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: Dockerfile.bmi-forcings
          push: true
          tags: ${{ needs.setup.outputs.bmi_image }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            BMI_BASE_TAG=${{ needs.setup.outputs.bmi_base_tag }}
            BMI_BASE_DIGEST=${{ needs.setup.outputs.bmi_base_digest }}
            BMI_BASE_REVISION=${{ needs.setup.outputs.bmi_base_revision }}
            EWTS_ORG=${{ inputs.EWTS_ORG || github.repository_owner }}
            EWTS_REF=${{ inputs.EWTS_REF || needs.setup.outputs.default_ref }}
            EWTS_REVISION=${{ needs.setup.outputs.ewts_revision }}
            EWTS_CACHE_BUST=${{ needs.setup.outputs.ewts_cache_bust }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ needs.setup.outputs.commit_sha }}
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.clean_ref }}
      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # clear Docker build cache only
          # This removes intermediate layers but keeps the final bmi image
          docker builder prune -af

          # remove dangling images only
          docker image prune -f

          # check space
          df -h
      - name: Unit Test BMI
        run: |
          docker run --rm ${{ needs.setup.outputs.bmi_image }}:${{ needs.setup.outputs.test_image_tag }} \
          echo "Running BMI Forcing Unit Tests..."
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.69.3
      - name: Trivy scan (BMI Forcing)
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results-bmi-forcing.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.bmi_image }}:${{ needs.setup.outputs.test_image_tag }}
      - name: Promote Tags
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.bmi_image }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # tag with 'latest' if on development branch
          if [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi

  # trigger downstream repo ngen
  # always passes TRIGGER_DOWNSTREAM=true to ngen so the chain propagates to nwm-cal-mgr and nwm-fcst-mgr
  trigger-ngen:
    name: trigger-ngen
    if: |
      success() && (
        (github.event_name == 'push' && (github.ref_name == 'development' || github.ref_name == 'ngwpc-candidate' || github.ref_name == 'ngwpc-release')) ||
        (github.event_name == 'workflow_dispatch' && inputs.TRIGGER_DOWNSTREAM)
      )
    runs-on: ubuntu-latest
    needs:
      - setup
      - pipeline-bmi
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.PIPELINE_APP_ID }}
          private-key: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Trigger ngen CI/CD
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NGEN_REF: ${{ inputs.NGEN_REF || needs.setup.outputs.default_ref }}
          NWM_CAL_MGR_REF: ${{ inputs.NWM_CAL_MGR_REF || needs.setup.outputs.default_ref }}
          NWM_FCST_MGR_REF: ${{ inputs.NWM_FCST_MGR_REF || needs.setup.outputs.default_ref }}
          EWTS_ORG: ${{ inputs.EWTS_ORG || github.repository_owner }}
          EWTS_REF: ${{ inputs.EWTS_REF || needs.setup.outputs.default_ref }}
          MSW_MGR_ORG: ${{ inputs.MSW_MGR_ORG || github.repository_owner }}
          MSW_MGR_REF: ${{ inputs.MSW_MGR_REF || needs.setup.outputs.default_ref }}
          GHCR_ORG: ${{ inputs.GHCR_ORG || needs.setup.outputs.org }}
          NGEN_FORCING_IMAGE_TAG: ${{ needs.setup.outputs.alias_tag }}
        run: |
          gh workflow run ngwpc-cicd.yml \
            --repo ${{ github.repository_owner }}/ngen \
            --ref "$NGEN_REF" \
            -f TRIGGER_DOWNSTREAM=true \
            -f NWM_CAL_MGR_REF="$NWM_CAL_MGR_REF" \
            -f NWM_FCST_MGR_REF="$NWM_FCST_MGR_REF" \
            -f EWTS_ORG="$EWTS_ORG" \
            -f EWTS_REF="$EWTS_REF" \
            -f MSW_MGR_ORG="$MSW_MGR_ORG" \
            -f MSW_MGR_REF="$MSW_MGR_REF" \
            -f GHCR_ORG="$GHCR_ORG" \
            -f NGEN_FORCING_IMAGE_TAG="$NGEN_FORCING_IMAGE_TAG"
