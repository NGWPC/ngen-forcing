          file: Dockerfile.sfincs
          push: true
          tags: ${{ needs.setup.outputs.image_sfincs }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            SFINCS_CPU_IMAGE_TAG=${{ env.SFINCS_CPU_IMAGE_TAG  || 'latest' }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ needs.setup.outputs.build_date }}

      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
