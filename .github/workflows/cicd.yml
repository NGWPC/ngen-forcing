name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ['*']
    tags: ['*']
  pull_request:
    branches: [main, development]

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_base:    ${{ steps.vars.outputs.image_base }}
      tag:           ${{ steps.vars.outputs.tag }}
      image_bmi:     ${{ steps.vars.outputs.image_bmi }}
      image_lumped:  ${{ steps.vars.outputs.image_lumped }}
      image_coastal: ${{ steps.vars.outputs.image_coastal }}
    steps:
      - name: Compute image names and safe tag
        id: vars
        shell: bash
        run: |
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="ghcr.io/${ORG}/${REPO}"

          # sanitize tag to be safe for use in image names
          RAW_TAG="${GITHUB_REF_NAME}"
          SAFE_TAG="$(echo "${RAW_TAG}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -c '[:alnum:]._-' '-' \
            | cut -c1-128)"

          echo "image_base=${IMAGE_BASE}"                   >> "$GITHUB_OUTPUT"
          echo "tag=${SAFE_TAG}"                            >> "$GITHUB_OUTPUT"
          echo "image_bmi=${IMAGE_BASE}-bmi-forcings"       >> "$GITHUB_OUTPUT"
          echo "image_lumped=${IMAGE_BASE}-lumped-forcings" >> "$GITHUB_OUTPUT"
          echo "image_coastal=${IMAGE_BASE}-coastal"        >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx (docker-container driver)
      # ensures cache export/import (type=gha) is supported
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only)
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push BMI Forcing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bmi-forcings
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Lumped Forcing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lumped-forcings
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Coastal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ngencoastal
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  unit-test-bmi:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    container:
      image: ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - run: echo "Running BMI Forcing Unit Tests..."

  unit-test-lumped:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    container:
      image: ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - run: echo "Running Lumped Forcing Unit Tests..."

  unit-test-coastal:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    container:
      image: ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - run: echo "Running Coastal Unit Tests..."

  sonarqube:
    if: github.repository_owner == 'NGWPC'
    runs-on: self-hosted
    needs: [unit-test-bmi, unit-test-lumped, unit-test-coastal]
    continue-on-error: true
    container:
      image: sonarsource/sonar-scanner-cli
      options: --entrypoint="" --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          sonar-scanner -X -Dsonar.verbose=true
          -Dproject.settings=sonar-project.properties
          -Dsonar.host.url="$SONAR_HOST_URL"
          -Dsonar.login="$SONAR_TOKEN"


  container_scanning:
    runs-on: ubuntu-latest
    needs: [setup, build]
    strategy:
      matrix:
        target:
          - { name: bmi,     ref: '${{ needs.setup.outputs.image_bmi }}' }
          - { name: lumped,  ref: '${{ needs.setup.outputs.image_lumped }}' }
          - { name: coastal, ref: '${{ needs.setup.outputs.image_coastal }}' }
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan (${{ matrix.target.name }})
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.target.ref }}:${{ needs.setup.outputs.tag }}
          format: sarif
          output: trivy-results-${{ matrix.target.name }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF (${{ matrix.target.name }})
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.target.name }}.sarif


  deploy:
    runs-on: self-hosted
    needs: [setup, build, container_scanning]
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push latest (BMI Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.tag }}
          docker tag  ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.tag }} ${{ needs.setup.outputs.image_bmi }}:latest
          docker push ${{ needs.setup.outputs.image_bmi }}:latest

      - name: Tag & push latest (Lumped Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.tag }}
          docker tag  ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.tag }} ${{ needs.setup.outputs.image_lumped }}:latest
          docker push ${{ needs.setup.outputs.image_lumped }}:latest

      - name: Tag & push latest (Coastal)
        run: |
          docker pull ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.tag }}
          docker tag  ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.tag }} ${{ needs.setup.outputs.image_coastal }}:latest
          docker push ${{ needs.setup.outputs.image_coastal }}:latest
