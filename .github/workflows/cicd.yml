name: CI/CD Pipeline

on:
  push:
    branches: [ngwpc-candidate, ngwpc-release, master, nwm-master, development, release-candidate]
  pull_request:
    branches: [ngwpc-candidate, ngwpc-release, main, nwm-master, development, release-candidate]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Select which image(s) to build'
        required: true
        default: 'All'
        type: choice
        options:
          - All
          - BMI
          - Coastal
          - SFINCS
      trigger_downstream:
        description: 'PENDING APPROVAL: Trigger downstream repositories pipeline after successful run (only applicable for All/BMI builds)'
        required: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  # set variables for use in other jobs
  setup:
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.vars.outputs.org }}
      image_base: ${{ steps.vars.outputs.image_base }}
      image_bmi: ${{ steps.vars.outputs.image_bmi }}
      image_coastal: ${{ steps.vars.outputs.image_coastal }}
      image_sfincs: ${{ steps.vars.outputs.image_sfincs }}
      pr_tag: ${{ steps.vars.outputs.pr_tag }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
      alias_tag: ${{ steps.vars.outputs.alias_tag }}
      build_date: ${{ steps.vars.outputs.build_date }}
      clean_ref: ${{ steps.vars.outputs.clean_ref }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          # one datetime for all time variables
          NOW=$(date -u +'%Y-%m-%d %H:%M:%S')

          # for OCI labels
          BUILD_DATE=$(date -u -d "$NOW" +'%Y-%m-%dT%H:%M:%SZ')

          # for Docker image tags
          TIMESTAMP=$(date -u -d "$NOW" +'%Y%m%d%H%M%SZ')

          # logic to get the real branch name even on pull requests
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            REAL_REF="${{ github.head_ref }}"
          else
            REAL_REF="${{ github.ref_name }}"
          fi

          # clean ref name and short commit sha
          CLEAN_REF=$(echo "$REAL_REF" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          SHORT_SHA="${GITHUB_SHA:0:12}"

          # set variables to use with Docker images
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}"

          # logic for the tags:
          # test_image_tag: used for the initial build and test
          # alias_tag: used for final tagging on successful tests
          # for pull requests, use pr-<pr-number>-build
          # for workflow_dispatch and pushes, use <timestamp>-<clean-ref-name>

          # test tag is always commit short sha
          TEST_TAG="${SHORT_SHA}"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            ALIAS="pr-${{ github.event.pull_request.number }}-build"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_EVENT_NAME" = "push" ]; then
            ALIAS="${TIMESTAMP}-${CLEAN_REF}"
          else
            ALIAS="${SHORT_SHA}" # fallback
          fi

          # save outputs
          echo "org=${ORG}" >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_bmi=${IMAGE_BASE}/ngen-bmi-forcing" >> "$GITHUB_OUTPUT"
          echo "image_coastal=${IMAGE_BASE}/ngen-coastal" >> "$GITHUB_OUTPUT"
          echo "image_sfincs=${IMAGE_BASE}/ngen-sfincs-forcing" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "test_image_tag=${TEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "alias_tag=${ALIAS}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "clean_ref=${CLEAN_REF}" >> "$GITHUB_OUTPUT"

  # CodeQL scan
  codeql-scan:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # build ngen-bmi-forcing Docker image
  pipeline-bmi:
    name: pipeline-bmi
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.build_target == 'All' || inputs.build_target == 'BMI'))
    runs-on: ubuntu-latest
    needs: [setup]
    outputs:
      bmi_digest: ${{ steps.build_bmi_image.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push BMI Forcing
        id: build_bmi_image # set ID to capture output from this step to use outputs like digest, imageid, and metadata
        uses: docker/build-push-action@v6
        with:
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: Dockerfile.bmi-forcings
          # file: Dockerfile.test
          push: true
          tags: ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ needs.setup.outputs.build_date }}
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.clean_ref }}

      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # clear Docker build cache only
          # This removes intermediate layers but keeps the final bmi image
          docker builder prune -af

          # remove dangling images only
          docker image prune -f

          # check space
          df -h

      - name: Unit Test BMI
        run: |
          docker run --rm ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.test_image_tag }} \
          echo "Running BMI Forcing Unit Tests..."

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true
          version: v0.68.2

      - name: Trivy scan (BMI Forcing)
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results-bmi-forcing.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.test_image_tag }}

      - name: Promote Tags
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.image_bmi }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # additionally tag with 'latest' if on development branch push
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi

  # build ngen-coastal image
  pipeline-coastal:
    name: pipeline-coastal
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.build_target == 'All' || inputs.build_target == 'Coastal'))
    runs-on: ubuntu-latest
    needs: [setup]
    outputs:
      coastal_digest: ${{ steps.build_coastal.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Coastal
        id: build_coastal # to capture Docker image digest
        uses: docker/build-push-action@v6
        with:
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: Dockerfile.ngencoastal
          push: true
          tags: ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ needs.setup.outputs.build_date }}
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.clean_ref }}

      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # clear Docker build cache only
          # This removes intermediate layers but keeps the final coastal image
          docker builder prune -af

          # remove dangling images only
          docker image prune -f

          # check space
          df -h

      - name: Unit Test Coastal
        run: |
          docker run --rm ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.test_image_tag }} \
          echo "Running Coastal Unit Tests..."

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true
          version: v0.68.2

      - name: Trivy scan (Coastal)
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results-coastal.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.test_image_tag }}

      - name: promote tags (alias and latest)
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.image_coastal }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # additionally tag with 'latest' if on development branch push
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi

  # build ngen-sfincs-forcing image
  pipeline-sfincs:
    name: pipeline-sfincs
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.build_target == 'All' || inputs.build_target == 'SFINCS'))
    runs-on: ubuntu-latest
    needs: [setup]
    outputs:
      sfincs_digest: ${{ steps.build_sfincs.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push SFINCS
