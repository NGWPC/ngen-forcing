name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, nwm-main, development, release-candidate]
  push:
    branches: [main, nwm-main, development, release-candidate]
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_base: ${{ steps.vars.outputs.image_base }}
      image_bmi: ${{ steps.vars.outputs.image_bmi }}
      image_lumped: ${{ steps.vars.outputs.image_lumped }}
      image_coastal: ${{ steps.vars.outputs.image_coastal }}
      pr_tag: ${{ steps.vars.outputs.pr_tag }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_bmi=${IMAGE_BASE}/ngen-bmi-forcing" >> "$GITHUB_OUTPUT"
          echo "image_lumped=${IMAGE_BASE}/ngen-lumped-forcing" >> "$GITHUB_OUTPUT"
          echo "image_coastal=${IMAGE_BASE}/ngen-coastal" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_TAG="pr-${PR_NUM}-build"
            echo "pr_tag=${PR_TAG}" >> "$GITHUB_OUTPUT"
            echo "test_image_tag=${PR_TAG}" >> "$GITHUB_OUTPUT"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            COMMIT_SHA="${GITHUB_SHA}"
            SHORT_SHA="${COMMIT_SHA:0:12}"
            echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
            echo "commit_sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "test_image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

  build-bmi:
    name: build-bmi
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push BMI Forcing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bmi-forcings
          push: true
          tags: ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.test_image_tag }}

  build-lumped:
    name: build-lumped
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Lumped Forcing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lumped-forcings
          push: true
          tags: ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.test_image_tag }}

  build-coastal:
    name: build-coastal
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Coastal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ngencoastal
          push: true
          tags: ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.test_image_tag }}

  unit-test-bmi:
    name: unit-test-bmi
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build-bmi]
    container:
      image: ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.test_image_tag }}
    steps:
      - run: echo "Running BMI Forcing Unit Tests..."

  unit-test-lumped:
    name: unit-test-lumped
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build-lumped]
    container:
      image: ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.test_image_tag }}
    steps:
      - run: echo "Running Lumped Forcing Unit Tests..."

  unit-test-coastal:
    name: unit-test-coastal
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build-coastal]
    container:
      image: ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.test_image_tag }}
    steps:
      - run: echo "Running Coastal Unit Tests..."

  sonarqube-internal:
    if: (github.event_name == 'pull_request' || github.event_name == 'push') && github.repository_owner == 'NGWPC'
    runs-on: self-hosted
    needs: [setup, build-bmi, build-lumped, build-coastal]
    continue-on-error: true
    container:
      image: sonarsource/sonar-scanner-cli
      options: --entrypoint="" --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -X -Dsonar.verbose=true

  codeql-scan:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build-bmi, build-lumped, build-coastal]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  container-scanning:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build-bmi, build-lumped, build-coastal]
    strategy:
      matrix:
        target:
          - { name: bmi,     ref: '${{ needs.setup.outputs.image_bmi }}' }
          - { name: lumped,  ref: '${{ needs.setup.outputs.image_lumped }}' }
          - { name: coastal, ref: '${{ needs.setup.outputs.image_coastal }}' }

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache Trivy DB between runs to avoid re-downloading
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('**/lockfiles-or-just-use-workflow-yaml') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Trivy scan (${{ matrix.target.name }})
        uses: aquasecurity/trivy-action@0.24.0
        timeout-minutes: 45 # step timeout (increase for coastal)
        with:
          image-ref: ${{ matrix.target.ref }}:${{ needs.setup.outputs.test_image_tag }}
          format: sarif
          output: trivy-results-${{ matrix.target.name }}.sarif
          severity: CRITICAL,HIGH
          scanners: vuln # only vulnerability scanning
          ignore-unfixed: true # smaller SARIF, faster result handling
          args: --timeout 30m # Trivy internal timeout

      - name: Upload SARIF (${{ matrix.target.name }})
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.target.name }}.sarif

  deploy-latest-on-development:
    name: deploy-latest-on-development
    if: github.event_name == 'push' && github.ref_name == 'development'
    runs-on: ubuntu-latest
    needs: [setup, build-bmi, build-lumped, build-coastal, unit-test-bmi, unit-test-lumped, unit-test-coastal, sonarqube-internal, codeql-scan, container-scanning]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push latest (BMI Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.commit_sha_short }}
          docker tag  ${{ needs.setup.outputs.image_bmi }}:${{ needs.setup.outputs.commit_sha_short }} ${{ needs.setup.outputs.image_bmi }}:latest
          docker push ${{ needs.setup.outputs.image_bmi }}:latest

      - name: Tag & push latest (Lumped Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.commit_sha_short }}
          docker tag  ${{ needs.setup.outputs.image_lumped }}:${{ needs.setup.outputs.commit_sha_short }} ${{ needs.setup.outputs.image_lumped }}:latest
          docker push ${{ needs.setup.outputs.image_lumped }}:latest

      - name: Tag & push latest (Coastal)
        run: |
          docker pull ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.commit_sha_short }}
          docker tag  ${{ needs.setup.outputs.image_coastal }}:${{ needs.setup.outputs.commit_sha_short }} ${{ needs.setup.outputs.image_coastal }}:latest
          docker push ${{ needs.setup.outputs.image_coastal }}:latest

  release:
    name: release
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Resolve commit sha for the tag
        id: rev
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Tag image with release tag (BMI Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_bmi }}:${{ steps.rev.outputs.short_sha }}
          docker tag  ${{ needs.setup.outputs.image_bmi }}:${{ steps.rev.outputs.short_sha }} ${{ needs.setup.outputs.image_bmi }}:${{ github.event.release.tag_name }}
          docker push ${{ needs.setup.outputs.image_bmi }}:${{ github.event.release.tag_name }}

      - name: Tag image with release tag (Lumped Forcing)
        run: |
          docker pull ${{ needs.setup.outputs.image_lumped }}:${{ steps.rev.outputs.short_sha }}
          docker tag  ${{ needs.setup.outputs.image_lumped }}:${{ steps.rev.outputs.short_sha }} ${{ needs.setup.outputs.image_lumped }}:${{ github.event.release.tag_name }}
          docker push ${{ needs.setup.outputs.image_lumped }}:${{ github.event.release.tag_name }}

      - name: Tag image with release tag (Coastal)
        run: |
          docker pull ${{ needs.setup.outputs.image_coastal }}:${{ steps.rev.outputs.short_sha }}
          docker tag  ${{ needs.setup.outputs.image_coastal }}:${{ steps.rev.outputs.short_sha }} ${{ needs.setup.outputs.image_coastal }}:${{ github.event.release.tag_name }}
          docker push ${{ needs.setup.outputs.image_coastal }}:${{ github.event.release.tag_name }}
